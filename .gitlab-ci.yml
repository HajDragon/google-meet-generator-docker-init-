stages:
  - test
  - build
  - deploy

variables:
  # This is the exact path required for your registry
  DOCKER_IMAGE: registry.gitlab.com/hajdragon/google-meet-generator-docker-init:latest

test:
  stage: test
  image: python:3.11
  script:
    - pip install -r requirements.txt
    - pytest

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"username\":\"$CI_REGISTRY_USER\",\"password\":\"$CI_REGISTRY_PASSWORD\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor --context $CI_PROJECT_DIR --dockerfile $CI_PROJECT_DIR/Dockerfile --destination $DOCKER_IMAGE
  only:
    - main

deploy:
  stage: deploy
  image: curlimages/curl:latest
  script:
    # Trigger Azure to pull the new image
    - curl -X POST "$AZURE_WEBHOOK_URL"
  only:
    - main
